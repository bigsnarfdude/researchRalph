<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>RRMA-R1 Agent Traces</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #0d1117; color: #c9d1d9; }
  h1,h2,h3 { color: #58a6ff; }
  blockquote { border-left: 3px solid #388bfd; padding-left: 16px; color: #8b949e; margin: 8px 0; }
  code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  pre { background: #161b22; padding: 16px; border-radius: 6px; overflow-x: auto; }
  details { margin: 4px 0; }
  summary { cursor: pointer; color: #6e7681; font-size: 0.85em; }
  details[open] summary { color: #8b949e; }
  hr { border-color: #30363d; margin: 32px 0; }
  strong { color: #e3b341; }
  a { color: #58a6ff; }
  #nav { position: fixed; top: 20px; right: 20px; background: #161b22; border: 1px solid #30363d; padding: 12px; border-radius: 6px; font-size: 0.8em; }
  #nav a { display: block; margin: 4px 0; color: #8b949e; text-decoration: none; }
  #nav a:hover { color: #58a6ff; }
</style>
</head>
<body>
<div id="nav">
  <strong style="color:#58a6ff">Sessions</strong>
  <div id="nav-links"></div>
</div>
<div id="content">Loading traces...</div>
<script>
  // Load traces.md relative to this file
  const base = window.location.href.replace('tools/viewer.html', '');
  fetch(base + 'domains/rrma-r1/logs/traces.md')
    .then(r => r.text())
    .then(text => {
      document.getElementById('content').innerHTML = marked.parse(text);
      // Build nav from h1s
      const headers = document.querySelectorAll('h1');
      const nav = document.getElementById('nav-links');
      headers.forEach((h, i) => {
        h.id = 'session-' + i;
        const a = document.createElement('a');
        a.href = '#session-' + i;
        a.textContent = h.textContent.slice(0, 30);
        nav.appendChild(a);
      });
    });
</script>
</body>
</html>
