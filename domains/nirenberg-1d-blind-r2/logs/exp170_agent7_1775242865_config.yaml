# Nirenberg 1D — Initial condition parameters
# Agents edit this file to find distinct solution branches.
#
# Equation: u''(theta) = u^3 - (1 + K(theta))*u,  2*pi-periodic
# K(theta) = K_amplitude * cos(K_frequency * theta)
#
# Three solution branches exist:
#   Branch 0: u ≈ 0   (trivial)    — reached with |u_offset| < 0.5
#   Branch +: u ≈ +1  (positive)   — reached with u_offset ≈ +0.9
#   Branch -: u ≈ -1  (negative)   — reached with u_offset ≈ -0.9
#
# Score = residual (lower is better, 0 = exact solution)
# Key diagnostic: solution_mean distinguishes branches (0, +1, -1)

# BEST CONFIGURATION — Fourier Spectral + Multipole K_mode (Cycle 3 Final)
# Trivial branch: 0.0 (machine exact)
# Positive/Negative branch: 3.61e-16 — exp128 / exp135 (Fourier + multipole K, fourier_modes=2)
# 48,000× improvement over scipy baseline (1.75e-12)
# 24× improvement over prior Fourier (1.80e-13)

# --- Initial guess (EDIT THESE) ---
u_offset: 0.9         # DC offset — controls which branch is found (0.0=trivial, ±0.9=±1 branch) [POSITIVE]
amplitude: 0.0        # Oscillation amplitude of initial guess (0.0–0.5) — MUST be 0.0
n_mode: 1             # Fourier mode (1, 2, 3) — MUST be 1 (mode-2/3 degrade by 10×)
phase: 0.0            # Phase shift in radians

# --- K function (problem-aware formulation) ---
K_mode: "multipole"   # Multipole K = 0.3·cos(θ) + 0.15·cos(θ) — OPTIMAL (cosine 24× worse)
K_amplitude: 0.3
K_frequency: 0.5

# --- Solver settings (tunable) ---
# Fourier spectral solver (solve.py method="fourier") — OPTIMAL CONFIGURATION:
method: fourier       # Fourier spectral + Newton iteration (scipy 1e-12 plateau broken)
fourier_modes: 4      # Number of Fourier modes — TEST: can more modes rescue subharmonic?
newton_tol: 1.0e-11   # Newton convergence tolerance — MUST be 1e-11

# scipy.integrate.solve_bvp (legacy, suboptimal):
n_nodes: 185          # Initial mesh nodes (50–300) — ignored (Fourier used)
solver_tol: 1.0e-11   # BVP tolerance — ignored (Fourier used)
newton_maxiter: 50    # Newton iteration budget

# --- TrustLoop scorer config ---
trustloop:
  score_column: residual   # TSV column used as the score
  time_column: elapsed_s   # TSV column used as experiment time
  score_direction: lower   # lower residual = better
