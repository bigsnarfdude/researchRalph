# Nirenberg 1D — Fourier spectral solver config
# Exploring Fourier spectral method (Exp. 233 achieved 2.73e-13)

# --- Initial guess ---
u_offset: -0.9        # Negative branch (exp233 target)
amplitude: 0.0        # No perturbation (exp233 config)
n_mode: 1             # Base mode
phase: 0.0            # No phase shift

# --- K function (fixed) ---
K_mode: "cosine"
K_amplitude: 0.3
K_frequency: 1

# --- Fourier spectral solver settings ---
method: fourier       # Use Fourier spectral instead of scipy
fourier_modes: 64     # Testing mode 64 (adjacent sweep)
newton_tol: 1.0e-11   # Newton convergence tolerance

# --- TrustLoop scorer config ---
trustloop:
  score_column: residual
  time_column: elapsed_s
  score_direction: lower
