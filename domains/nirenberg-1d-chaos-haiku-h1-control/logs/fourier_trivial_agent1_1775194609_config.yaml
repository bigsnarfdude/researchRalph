# Nirenberg 1D — Agent 1 config
# Fourier spectral method — trivial branch

u_offset: 0.0
amplitude: 0.0
n_mode: 1
phase: 0.0

K_mode: "cosine"
K_amplitude: 0.3
K_frequency: 1

method: fourier
fourier_modes: 64
newton_tol: 1.0e-14
newton_maxiter: 50

n_nodes: 300
solver_tol: 1.0e-12

trustloop:
  score_column: residual
  time_column: elapsed_s
  score_direction: lower
