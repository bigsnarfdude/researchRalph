# Nirenberg 1D — Fourier spectral solver experiment
# Agent2: testing Fourier method for spectral accuracy

# --- Initial guess (EDIT THESE) ---
u_offset: -1.0        # DC offset — negative branch
amplitude: 0.1        # Oscillation amplitude of initial guess (0.0–0.5)
n_mode: 1             # Fourier mode (1, 2, 3)
phase: 0.0            # Phase shift in radians

# --- K function (fixed problem parameters — DO NOT CHANGE) ---
K_mode: "cosine"
K_amplitude: 0.3
K_frequency: 1

# --- Solver settings ---
method: "fourier"       # Use Fourier spectral solver instead of scipy
fourier_modes: 16       # Number of Fourier modes (minimal)
newton_tol: 1.0e-12     # Newton convergence tolerance (relaxed for convergence)
newton_maxiter: 100     # Max Newton iterations

# --- Also keep scipy params for fallback ---
n_nodes: 300
solver_tol: 1.0e-10

# --- TrustLoop scorer config ---
trustloop:
  score_column: residual
  time_column: elapsed_s
  score_direction: lower
